service: web-app
schema-version: 1
consumes:
  - id: orders.get-order
    provider: order-service
    dto: com.acme.orders.web.OrderView
extractors:
  # Java FQNs have no file suffix: "*" is the fallback route. The demo scripts
  # symlink .wirefit-demo/web-app at the compiled classes; a real service
  # would let wirefit-java resolve its classpath (--build-tool maven|gradle).
  - match: "*"
    command: "wirefit-java --classpath .wirefit-demo/web-app:.wirefit-demo/jakarta.annotation-api-3.0.0.jar"
